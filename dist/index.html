<body>

<header class="site-header">
  <a href="/" class="home-link" aria-label="Home">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </a>
  <span class="command-heading"></span>
  <div class="search-widget">
    <input class="site-search" type="search" placeholder="Search SQL commands…"
           autocomplete="off" aria-label="Search SQL commands">
    <ul class="search-results" hidden role="listbox" aria-label="Search suggestions"></ul>
  </div>
</header>

<!-- Homepage-specific styles (shared base is in /styles.css) -->
<style>
  h1 {
    color: #2c3e50;
    text-align: center;
    margin-bottom: 30px;
  }
  .examples {
    background-color: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    margin-top: 30px;
  }
  .examples h2 { margin-top: 0; color: #2c3e50; }
  .example {
    margin-bottom: 10px;
    color: #3498db;
    text-decoration: none;
    display: block;
  }
  .example:hover { text-decoration: underline; }
  .all-commands {
    background-color: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    margin-top: 40px;
  }
  .all-commands h2 { margin-top: 0; color: #2c3e50; }
  .command-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .command-list a {
    color: #3498db;
    text-decoration: none;
    font-size: 14px;
  }
  .command-list a:hover { text-decoration: underline; }
</style>

<h1>SQL Command Compatibility Checker</h1>

<div class="examples">
  <h2>Popular SQL Commands</h2>
  <a class="example" href="/f/select">SELECT</a>
  <a class="example" href="/f/merge">MERGE</a>
  <a class="example" href="/f/pivot">PIVOT</a>
  <a class="example" href="/f/string-agg">STRING AGG</a>
</div>

<div class="all-commands" id="allCommands" style="display: none;">
  <h2>All SQL Commands</h2>
  <div class="command-list" id="commandList"></div>
</div>

<script>
  function renderCommandIndex(data) {
    var list    = document.getElementById('commandList');
    var section = document.getElementById('allCommands');
    Object.keys(data).forEach(function (key) {
      var a = document.createElement('a');
      a.href = '/f/' + data[key].slug;
      a.textContent = key.toUpperCase();
      list.appendChild(a);
    });
    section.style.display = 'block';
  }

  document.addEventListener('DOMContentLoaded', function () {
    fetch('data.json?v=2')
      .then(function (r) { return r.json(); })
      .then(function (data) { renderCommandIndex(data); });
  });
</script>

<footer class="site-footer">
  <p>Looking for another SQL command?</p>
  <div class="search-widget">
    <input class="site-search" type="search" placeholder="Search SQL commands…"
           autocomplete="off" aria-label="Search SQL commands">
    <ul class="search-results" hidden role="listbox" aria-label="Search suggestions"></ul>
  </div>
</footer>

  <script src="/search.js" defer></script>
  <script src="/splash.js" defer></script>
</body>
</html>
