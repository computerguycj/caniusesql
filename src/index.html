<!-- Homepage-specific styles (shared base is in /styles.css) -->
<style>
  h1 {
    color: #2c3e50;
    text-align: center;
    margin-bottom: 30px;
  }
  .examples {
    background-color: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    margin-top: 30px;
  }
  .examples h2 { margin-top: 0; color: #2c3e50; }
  .example {
    margin-bottom: 10px;
    color: #3498db;
    text-decoration: none;
    display: block;
  }
  .example:hover { text-decoration: underline; }
  .all-commands {
    background-color: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    margin-top: 40px;
  }
  .all-commands h2 { margin-top: 0; color: #2c3e50; }
  .command-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .command-list a {
    color: #3498db;
    text-decoration: none;
    font-size: 14px;
  }
  .command-list a:hover { text-decoration: underline; }
</style>

<h1>SQL Command Compatibility Checker</h1>

<div class="examples">
  <h2>Popular SQL Commands</h2>
  <a class="example" href="/f/select">SELECT</a>
  <a class="example" href="/f/merge">MERGE</a>
  <a class="example" href="/f/pivot">PIVOT</a>
  <a class="example" href="/f/string-agg">STRING AGG</a>
</div>

<div class="all-commands" id="allCommands" style="display: none;">
  <h2>All SQL Commands</h2>
  <div class="command-list" id="commandList"></div>
</div>

<script>
  function renderCommandIndex(data) {
    var list    = document.getElementById('commandList');
    var section = document.getElementById('allCommands');
    Object.keys(data).forEach(function (key) {
      var a = document.createElement('a');
      a.href = '/f/' + data[key].slug;
      a.textContent = key.toUpperCase();
      list.appendChild(a);
    });
    section.style.display = 'block';
  }

  document.addEventListener('DOMContentLoaded', function () {
    fetch('data.json?v=2')
      .then(function (r) { return r.json(); })
      .then(function (data) { renderCommandIndex(data); });
  });
</script>
