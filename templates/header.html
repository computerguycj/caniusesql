<header class="site-header">
  <a href="/" class="home-link" aria-label="Home">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="30" height="30" aria-hidden="true">
      <defs>
        <linearGradient id="hbg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#5dade2"/>
          <stop offset="100%" stop-color="#1a6391"/>
        </linearGradient>
      </defs>
      <!-- Badge background -->
      <rect width="32" height="32" rx="7" fill="url(#hbg)"/>
      <!-- House roof -->
      <polygon points="16,6 27,15 5,15" fill="white"/>
      <!-- House body -->
      <rect x="7" y="15" width="18" height="12" rx="1" fill="white"/>
      <!-- Door -->
      <rect x="13" y="19" width="6" height="8" rx="1" fill="#1a6391"/>
      <!-- Windows -->
      <rect x="8"  y="17" width="4" height="3" rx="0.5" fill="#1a6391" opacity="0.55"/>
      <rect x="20" y="17" width="4" height="3" rx="0.5" fill="#1a6391" opacity="0.55"/>
    </svg>
  </a>
  <span class="command-heading">{{COMMAND_HEADING}}</span>
  <div class="search-widget">
    <input class="site-search" type="search" placeholder="Search SQL commands…"
           autocomplete="off" aria-label="Search SQL commands">
    <ul class="search-results" hidden role="listbox" aria-label="Search suggestions"></ul>
  </div>
</header>
